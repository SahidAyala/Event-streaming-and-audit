# =============================================================================
# Event Streaming & Audit Platform — full local stack
#
# Run everything with one command:
#   make up
#
# Services wait for their dependencies to be healthy before starting,
# so no race conditions and no manual ordering required.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9094:9094"   # EXTERNAL listener — host access for local tooling
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: events
      POSTGRES_USER: events
      POSTGRES_PASSWORD: events
    ports:
      - "5433:5432"   # 5433 on host to avoid conflicts with a local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events -d events"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Application services
  # Note: inside the Docker network, services talk by container name over
  # the internal ports (Kafka:9092, Postgres:5432) — not the host-mapped ones.
  # ---------------------------------------------------------------------------

  ingest-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: ingest-api
    container_name: ingest-api
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":50051"
      POSTGRES_DSN: "postgres://events:events@postgres:5432/events?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "events"
      KAFKA_DLQ_TOPIC: "events-dlq"
      KAFKA_GROUP_ID: "consumer-service"
      ELASTICSEARCH_ADDRS: "http://elasticsearch:9200"
      ELASTICSEARCH_INDEX: "events"
      AUTH_MODE: "simple"
      AUTH_API_KEY: "dev-api-key"
      ADMIN_KEY: "admin-secret"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  consumer-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: consumer-service
    container_name: consumer-service
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "events"
      KAFKA_DLQ_TOPIC: "events-dlq"
      KAFKA_GROUP_ID: "consumer-service"
      ELASTICSEARCH_ADDRS: "http://elasticsearch:9200"
      ELASTICSEARCH_INDEX: "events"
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:
  minio_data:
